<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Menu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: Arial; }
    h1 { color: #fff; font-size: 48px; margin-bottom: 50px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .games { display: flex; gap: 30px; }
    .game-card { background: #fff; width: 200px; padding: 30px; border-radius: 15px; text-align: center; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; text-decoration: none; color: #333; display: block; }
    .game-card:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .game-card h2 { margin-bottom: 15px; color: #1a1a2e; }
    .game-card p { color: #666; }
    .snake { border-top: 5px solid #4CAF50; }
    .todo { border-top: 5px solid #2196F3; }
    .mario { border-top: 5px solid #FF0000; }
  </style>
</head>
<body>
  <h1>🎮 Choose a Game</h1>
  <div class="games">
    <a href="snake.html" class="game-card snake">
      <h2>🐍 Snake</h2>
      <p>Classic snake game - eat food, grow longer!</p>
    </a>
    <a href="todo-app/index.html" class="game-card todo">
      <h2>📝 Todo List</h2>
      <p>Keep track of your tasks</p>
    </a>
    <a href="mario.html" class="game-card mario">
      <h2>🍄 Super Mario</h2>
      <p>Platformer - jump and collect coins!</p>
    </a>
  </div>
</body>
</html>
