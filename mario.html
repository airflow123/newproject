<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Mario</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #5C94FC; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { background: #5C94FC; border: 4px solid #000; }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="500"></canvas>
  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const player = { x: 50, y: 300, w: 30, h: 40, vx: 0, vy: 0, grounded: false };
    const gravity = 0.8, jumpPower = -15, speed = 5;
    const keys = {};

    const platforms = [
      { x: 0, y: 450, w: 800, h: 50 },
      { x: 200, y: 350, w: 100, h: 20 },
      { x: 350, y: 280, w: 100, h: 20 },
      { x: 500, y: 350, w: 100, h: 20 },
      { x: 650, y: 250, w: 100, h: 20 },
      { x: 100, y: 200, w: 80, h: 20 },
    ];

    const coins = [
      { x: 230, y: 310, collected: false },
      { x: 380, y: 240, collected: false },
      { x: 530, y: 310, collected: false },
      { x: 680, y: 210, collected: false },
      { x: 120, y: 160, collected: false },
    ];

    const enemies = [
      { x: 300, y: 410, w: 30, h: 30, vx: 2, startX: 250, endX: 400 },
      { x: 550, y: 410, w: 30, h: 30, vx: 2, startX: 500, endX: 650 },
    ];

    let score = 0;
    let gameOver = false;

    document.addEventListener("keydown", e => keys[e.code] = true);
    document.addEventListener("keyup", e => keys[e.code] = false);

    function rectIntersect(r1, r2) {
      return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
    }

    function update() {
      if (gameOver) return;

      if (keys["ArrowLeft"] || keys["KeyA"]) player.vx = -speed;
      else if (keys["ArrowRight"] || keys["KeyD"]) player.vx = speed;
      else player.vx = 0;

      if ((keys["ArrowUp"] || keys["KeyW"] || keys["Space"]) && player.grounded) {
        player.vy = jumpPower;
        player.grounded = false;
      }

      player.vy += gravity;
      player.x += player.vx;
      player.y += player.vy;

      if (player.x < 0) player.x = 0;
      if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;

      player.grounded = false;
      for (let p of platforms) {
        if (rectIntersect(player, p) && player.vy > 0 && player.y + player.h - player.vy <= p.y) {
          player.y = p.y - player.h;
          player.vy = 0;
          player.grounded = true;
        }
      }

      if (player.y > canvas.height) gameOver = true;

      for (let coin of coins) {
        if (!coin.collected && rectIntersect(player, { x: coin.x, y: coin.y, w: 20, h: 20 })) {
          coin.collected = true;
          score += 10;
        }
      }

      for (let enemy of enemies) {
        enemy.x += enemy.vx;
        if (enemy.x <= enemy.startX || enemy.x >= enemy.endX) enemy.vx *= -1;
        if (rectIntersect(player, enemy)) {
          if (player.vy > 0 && player.y + player.h < enemy.y + enemy.h / 2) {
            enemy.x = -1000;
            player.vy = -10;
            score += 5;
          } else {
            gameOver = true;
          }
        }
      }
    }

    function draw() {
      ctx.fillStyle = "#5C94FC";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#8B4513";
      for (let p of platforms) ctx.fillRect(p.x, p.y, p.w, p.h);

      ctx.fillStyle = "#FFD700";
      for (let coin of coins) {
        if (!coin.collected) {
          ctx.beginPath();
          ctx.arc(coin.x + 10, coin.y + 10, 10, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.fillStyle = "#FF0000";
      for (let enemy of enemies) {
        if (enemy.x > 0) {
          ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
          ctx.fillStyle = "#FFF";
          ctx.fillRect(enemy.x + 5, enemy.y + 5, 8, 8);
          ctx.fillRect(enemy.x + 17, enemy.y + 5, 8, 8);
          ctx.fillStyle = "#FF0000";
        }
      }

      ctx.fillStyle = "#FF0000";
      ctx.fillRect(player.x, player.y, player.w, player.h);
      ctx.fillStyle = "#FFB6C1";
      ctx.fillRect(player.x + 5, player.y, 20, 15);
      ctx.fillStyle = "#000";
      ctx.fillRect(player.x + 18, player.y + 8, 4, 4);
      ctx.fillRect(player.x + 24, player.y + 8, 4, 4);
      ctx.fillStyle = "#8B4513";
      ctx.fillRect(player.x, player.y + 30, 10, 10);
      ctx.fillRect(player.x + 20, player.y + 30, 10, 10);

      ctx.fillStyle = "#FFF";
      ctx.font = "24px Arial";
      ctx.fillText("Score: " + score, 20, 40);

      if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#FFF";
        ctx.font = "48px Arial";
        ctx.fillText("Game Over!", 250, 220);
        ctx.font = "24px Arial";
        ctx.fillText("Press R to Restart", 290, 270);
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    window.addEventListener("keydown", e => {
      if (e.code === "KeyR" && gameOver) {
        player.x = 50; player.y = 300; player.vx = 0; player.vy = 0;
        score = 0; gameOver = false;
        coins.forEach(c => c.collected = false);
        enemies.forEach(e => { e.x = e.startX; });
      }
    });

    gameLoop();
  </script>
</body>
</html>
